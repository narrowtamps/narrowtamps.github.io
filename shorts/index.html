<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bare Playlist Embed Test</title>
<style>
    .videoWrapper {
        position: relative;
        padding-bottom: 56.25%;
        height: 0;
        overflow: hidden;
        background-color: #000;
        margin-bottom: 15px;
    }
    .videoWrapper iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
    }
</style>
</head>
<body>

<div class="videoWrapper">
    <iframe
        src="https://www.youtube.com/embed/videoseries?list=PLJpGrYbV_YhA"
        title="YouTube playlist test"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen>
    </iframe>
</div>

</body>
</html>
