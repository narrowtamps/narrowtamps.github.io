<head>
<style>


.videoWrapper {
    position: relative;
    padding-bottom: 56.25%; /* 16:9 */
    height: 0;
    overflow: hidden;
}

.videoWrapper iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

</style>
</head>

<body>
<div class="videoWrapper" id="player">

</div>

<script>
      
      var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;
    var hasShuffled = false; // Flag to prevent an infinite loop of shuffling

    // 2. This function creates an <iframe> (and YouTube player) after the API code downloads.
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange
            }
        });
    }
        
    // 3. The API will call this function when the video player is ready.
    function onPlayerReady(event) {
        event.target.mute(); 
        // Cue the playlist so the API can fetch the list of video IDs
        event.target.cuePlaylist({
            listType: 'playlist',
            list: 'PLJpGrYbV_YhA'
        });
    }

    // 4. The API calls this function when the player's state changes.
    function onPlayerStateChange(event) {
        // YT.PlayerState.CUED means the playlist data is loaded and ready
        if (event.data === YT.PlayerState.CUED && !hasShuffled) {
            var playlistArray = event.target.getPlaylist();
            
            if (playlistArray && playlistArray.length > 0) {
                hasShuffled = true; // Mark as shuffled so we don't loop endlessly
                var randomIndex = Math.floor(Math.random() * playlistArray.length);
                
                // Play the randomly selected video index
                event.target.playVideoAt(randomIndex);
            }
        }
    }


    </script>
  </body>
</html>



</body>
