<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shuffled YouTube Playlist</title>
<style>
    /* Your responsive layout styles */
    .videoWrapper {
        position: relative;
        padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
        height: 0;
        overflow: hidden;
        background-color: #000;
        margin-bottom: 15px;
    }

    .videoWrapper iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
    }

    /* Style for the custom reshuffle button */
    .shuffle-btn {
        background-color: #ff0000;
        color: #fff;
        border: none;
        padding: 10px 20px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 4px;
        cursor: pointer;
        display: block;
        margin: 20px auto;
        transition: background 0.2s;
    }

    .shuffle-btn:hover {
        background-color: #cc0000;
    }
</style>
</head>

<body>

<!-- The responsive wrapper targeting your playlist player -->
<div class="videoWrapper" id="player"></div>

<!-- Reshuffle trigger button -->
<button class="shuffle-btn" onclick="reshufflePlaylist()">Reshuffle Playlist</button>

<script>
    // 1. Load the YouTube IFrame API script asynchronously
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
   
   
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;

    // 2. Initialize the player with the playlist inside playerVars directly
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            playerVars: {
                listType: 'playlist',
                list: 'PLJpGrYbV_YhA', // Your target playlist ID
                autoplay: 1,
                mute: 1,         // Mandatory for Chrome autoplay policies
                controls: 1
            },
            events: {
                'onReady': onPlayerReady
            }
        });
    }
        
    // 3. Handle playlist initialization and layout generation
    function onPlayerReady(event) {
        // A short 600ms timeout provides the API window it needs to map the index track array
        setTimeout(function() {
            executeRandomShuffle(event.target);
        }, 600);
    }

    // 4. Core logic to shuffle layout lists and pick random starting entries
    function executeRandomShuffle(playerInstance) {
        // Step A: Force the player queue array into random shuffle mode
        playerInstance.setShuffle(true);
        
        // Step B: Safely retrieve the freshly populated list entries
        var playlistArray = playerInstance.getPlaylist();
        
        if (playlistArray && playlistArray.length > 0) {
            // Step C: Calculate a random index number based on playlist length
            var randomIndex = Math.floor(Math.random() * playlistArray.length);
            
            // Step D: Jump straight to that random position and start playing
            playerInstance.playVideoAt(randomIndex);
        } else {
            // Fallback: If network lag delayed the array, force playing the deck from the start 
            playerInstance.playVideoAt(0);
        }
    }

    // 5. Action function linked directly to your reshuffle button
    function reshufflePlaylist() {
        if (player && typeof player.setShuffle === 'function') {
            executeRandomShuffle(player);
        }
    }
</script>
</body>
</html>
