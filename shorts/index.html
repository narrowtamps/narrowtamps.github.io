<!DOCTYPE html>
<html>
<head>
<style>
.videoWrapper {
    position: relative;
    padding-bottom: 56.25%; /* 16:9 */
    height: 0;
    overflow: hidden;
}

.videoWrapper iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}
</style>
</head>

<body>
<div class="videoWrapper" id="player"></div>

<script>
    // 1. Correctly load the API script
    var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0]; // Added missing [0]
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    var player;

    // 2. Initialize player directly with the playlist configuration
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
videoId: 'dQw4w9WgXcQ',
            playerVars: {
                listType: 'playlist',
                list: 'PLJpGrYbV_YhA',
                autoplay: 0
            },
            events: {
                'onReady': onPlayerReady
            }
        });
    }
        
    // 3. Wait for the player data to cache, then shuffle and play
    function onPlayerReady(event) {
        event.target.mute(); 

        // Check every 100ms if the playlist array is loaded
        var checkPlaylistInterval = setInterval(function() {
            var playlistArray = event.target.getPlaylist();
            
            if (playlistArray && playlistArray.length > 0) {
                clearInterval(checkPlaylistInterval); // Stop checking
                
                // Select a random video index
                var randomIndex = Math.floor(Math.random() * playlistArray.length);
                
                // Jump to and play the random video
                event.target.playVideoAt(randomIndex);
            }
        }, 100);
    }
</script>
</body>
</html>
