<head>
<style>


.videoWrapper {
    position: relative;
    padding-bottom: 56.25%; /* 16:9 */
    height: 0;
    overflow: hidden;
}

.videoWrapper iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

</style>
</head>

<body>
<div class="videoWrapper" id="player">

</div>

<script>
      
      var tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    var firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);


      
      var player;
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            playerVars: {
                listType: 'playlist',
                list: 'PLJpGrYbV_YhA'
            },
            events: {
                'onReady': onPlayerReady
            }
        });
    }
        
        
        function onPlayerReady(event) {
       event.target.mute(); 

       setTimeout(function() {
        // 3. Fetch the fully loaded array of videos in the playlist
        var playlistArray = event.target.getPlaylist();
        
        if (playlistArray && playlistArray.length > 0) {
            // 4. Generate a mathematically random index based on your playlist's size
            var randomIndex = Math.floor(Math.random() * playlistArray.length);
            
            // 5. Jump directly to that randomly selected video index
            event.target.playVideoAt(randomIndex);
        } else {
            // Fallback in case the array loads slowly: just force a standard kick-off
            event.target.playVideo();
        }
    }, 600); 
        
    }
    
    
    
      



    </script>
  </body>
</html>



</body>
