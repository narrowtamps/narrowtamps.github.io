<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shuffled YouTube Playlist</title>
<style>
    .videoWrapper {
        position: relative;
        padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
        height: 0;
        overflow: hidden;
        background-color: #000;
        margin-bottom: 15px;
    }

    .videoWrapper iframe {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border: 0;
    }

    .shuffle-btn {
        background-color: #ff0000;
        color: #fff;
        border: none;
        padding: 10px 20px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 4px;
        cursor: pointer;
        display: block;
        margin: 20px auto;
        transition: background 0.2s;
    }

    .shuffle-btn:hover {
        background-color: #cc0000;
    }
</style>
</head>
<body>

<div class="videoWrapper" id="player"></div>
<button class="shuffle-btn" onclick="reshufflePlaylist()">Reshuffle Playlist</button>

<script>
    // 1. Load the YouTube IFrame API script asynchronously
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    const firstScriptTag = document.getElementsByTagName('script')[0];
    firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

    let player;
    const PLAYLIST_ID = 'PLJpGrYbV_YhA'; // Extracted for clean reuse

    // 2. Initialize player WITH fixed listType configuration
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%',
            width: '100%',
            playerVars: {
                listType: 'playlist', // FIX: Crucial missing property
                list: PLAYLIST_ID,
                autoplay: 1,
                mute: 1,              // Allows autoplay on modern browsers
                controls: 1
            },
            events: {
                'onReady': onPlayerReady
            }
        });
    }
        
    // 3. Handle playlist initialization safely using state changes instead of timers
    function onPlayerReady(event) {
        executeRandomShuffle(event.target);
    }

    // 4. Stable execution logic for shuffling API video decks
    function executeRandomShuffle(playerInstance) {
        // Step A: Turn on shuffle state for the player queue
        playerInstance.setShuffle(true);
        
        // Step B: Fetch playlist tracking array safely
        const playlistArray = playerInstance.getPlaylist();
        
        if (playlistArray && playlistArray.length > 0) {
            // Step C: Choose a random index sequence position
            const randomIndex = Math.floor(Math.random() * playlistArray.length);
            // Step D: Direct player to begin directly at that random index
            playerInstance.playVideoAt(randomIndex);
        } else {
            // Fallback: If API state hasn't populated array, re-load list explicitly
            playerInstance.loadPlaylist({
                listType: 'playlist',
                list: PLAYLIST_ID,
                index: 0
            });
        }
    }

    // 5. Action function linked directly to the reshuffle button
    function reshufflePlaylist() {
        if (player && typeof player.setShuffle === 'function') {
            executeRandomShuffle(player);
        }
    }
</script>
</body>
</html>
