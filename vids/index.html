<!DOCTYPE html>
<html>
  <header>
    <style>
       .yt-container {
    position: relative;
    width: 100%;
    max-width: 800px;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    border-radius: 16px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.25);
    background-color: #000;
  }

  .yt-thumb-overlay {
    cursor: pointer;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .yt-thumbnail {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.7);
    transition: filter 0.3s;
  }

  .yt-thumb-overlay:hover .yt-thumbnail {
    filter: brightness(0.9);
  }

.yt-play-button {
    position: absolute;
    width: 120px;
    height: 120px;
    transition: transform 0.2s ease;
    cursor: pointer;
    background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="48" fill="rgba(0,0,0,0.5)"/><polygon points="38,28 74,50 38,72" fill="white" stroke="white" stroke-width="6" stroke-linejoin="round"/></svg>') center center no-repeat;

}

  .yt-thumb-overlay:hover .yt-play-button {
    transform: scale(1.1);
  }

 .yt-container  iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: 0;
  }
    </style>
  </header>
  <body>
    <!-- 1. The <iframe> (and video player) will replace this <div> tag. -->
    
<div class="yt-container" id="yt-container">
  <div class="yt-thumb-overlay" id="yt-overlay">
      
    <p><span id="current-time">0:00</span> / <span id="duration">0:00</span></p>
  </div>

<div id="player"></div>
  
</div>
    <script>
      // 2. This code loads the IFrame Player API code asynchronously.
      var tag = document.createElement('script');

      
      tag.src = "https://www.youtube.com/iframe_api";
      var firstScriptTag = document.getElementsByTagName('script')[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

      // 3. This function creates an <iframe> (and YouTube player)
      //    after the API code downloads.
      var player;
      function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
          height: '390',
          width: '640',
          videoId: '3Mbynm0pGX0',
          playerVars: {
            'playsinline': 1
          },
          events: {
            
            'onReady': initialize
          }
        });
      }
    
     
      function stopVideo() {
        player.stopVideo();
      }

    function initialize(){
        event.target.playVideo();
        // Update the controls on load
        updateTimerDisplay();
        updateProgressBar();
    
        // Clear any old interval.
        clearInterval(time_update_interval);
    
        // Start interval to update elapsed time display and
        // the elapsed part of the progress bar every second.
        time_update_interval = setInterval(function () {
            updateTimerDisplay();
            updateProgressBar();
        }, 1000)
    
    }
    
    // This function is called by initialize()
    function updateTimerDisplay(){
        // Update current time text display.
        $('#current-time').text(formatTime( player.getCurrentTime() ));
        $('#duration').text(formatTime( player.getDuration() ));
    }
    
    function formatTime(time){
        time = Math.round(time);
    
        var minutes = Math.floor(time / 60),
        seconds = time - minutes * 60;
    
        seconds = seconds < 10 ? '0' + seconds : seconds;
    
        return minutes + ":" + seconds;
    }
    </script>
  </body>
</html>
