<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon"  href="neon2.png">
    
    <title>Road to Neon</title>
    <link rel="stylesheet" href="road/dist/style.css">
    <link rel="stylesheet" href="../vhs/dist/style.css">
<style> 
.container {
    position: relative; /* Establishes positioning context for children */
    width: 100%;        /* Set desired dimensions */
    height: 300px;
    /* Other background styles, like background-image if set in CSS */
}

.overlay-text {
    position: fixed; /* Use fixed to stay centered regardless of background */
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center; /* Vertical center */
    align-items: center;     /* Horizontal center */
    z-index: 10;
    pointer-events: none;    /* Stops the invisible box from blocking clicks */
}

/* Ensure the title itself has space and doesn't collapse */
.eighties {
    position: relative;
    margin: 0;
    line-height: 1.2;
    pointer-events: auto;    /* Makes the title clickable/selectable again */
}


</style>
  </head>
    
  <body>
  <div class="overlay-text">
    <h1 class="eighties" data-text="Road to Neon"></h1>
    </div>
    <script  src="../vhs/dist/script.js"></script>
    
    <script  src="road/dist/script.js"></script>
<div id="footer-placeholder"></div>
    <script src="/pages/script.js"></script>
  </body>
  
</html>
