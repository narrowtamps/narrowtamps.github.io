
<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Space Jazz Babes of Cloud City or a nearby equivalent</title>
    <link rel='stylesheet' href='https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css'>
<link rel='stylesheet' href='https://use.fontawesome.com/releases/v5.8.1/css/all.css'>
<link rel="stylesheet" href="audio-visualizer/dist/style.css">
<style>
  .neon-container {
  position: relative;
  /* Apply neon glow to container */
  filter: drop-shadow(0 0 15px #ff0055) drop-shadow(0 0 30px #ff0055);
}

.image-1, .image-2 {
  position: absolute;
  filter: invert(100%);
  top: 0;
  left: 0;
  animation: alternateImages 1s infinite;
}

.image-2 {
  animation-delay: .5s; /* Delays second image to alternate */
}

@keyframes alternateImages {
  0%, 45% { opacity: 1; }
  55%, 100% { opacity: 0; }
}

</style>
  </head>
    
  <body>
  <div class="neon-container">
  <img src="leg1_nobg.png" class="top-img" alt="First Image">
  <img src="leg2_nobg.png" class="bottom-img" alt="Second Image">
</div>

  </body>
  
</html>
