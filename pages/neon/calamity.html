/* General body styling to remove margins */
body {
    margin: 0;
    background-color: #000; /* Black background behind the screen */
}

/* The main CRT container */
.crt {
    /* Green color scheme */
    color: #00ff00; /* Bright green text */
    background-color: #0a0a0a; /* Very dark background */
    font-family: "Courier New", monospace; /* Classic monospace font */
    font-size: 20px;
    padding: 20px;
    height: 100vh;
    box-sizing: border-box;
    position: relative;
    overflow: hidden;
     animation: flicker2 .15s infinite;
}

/* Glowing text effect */
.crt .terminal-content {
    text-shadow: 0 0 5px #00ff00, 0 0 2px #00ff00, 0 0 1px #00ff00; /* Subtle glow */
}

/* Scan lines effect using ::before pseudo-element */
.crt::before {
    content: " ";
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    bottom: 0;
    right: 0;
    background: linear-gradient(to bottom, rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
    background-size: 100% 2px; /* Controls the height of the scan lines */
    z-index: 2;
    pointer-events: none; /* Allows interaction with content underneath */
}

/* Flicker effect using ::after pseudo-element and animation */
.crt::after {
    content: " ";
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    bottom: 0;
    right: 0;
    background: rgba(18, 16, 16, 0.1);
    opacity: 0;
    z-index: 2;
    pointer-events: none;
    animation: flicker 0.15s infinite; /* Rapid, infinite flicker animation */
}

/* Keyframes for the random flicker animation */
@keyframes flicker {
    0%, 100% { opacity: 1; }
    5% { opacity: 0.8; }
    10% { opacity: 1; }

        .screen {
  position: relative;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 96vw;
  height: 96vh;
  padding: 1em;
  overflow: hidden;
  color: #14fdce;
  background: #031e11;
  border-radius: 1em;
  box-shadow: inset 0 0 1em 0 #010b06;
}
        .screen::before, .screen::after {
  content: "";
  position: absolute;
  z-index: 2;
  top: 0;
  right: 0;
  bottom: 0;
  left: 0;
  display: block;
}
.screen::before {
  background: linear-gradient(to bottom, rgba(30, 30, 30, 0.2), rgba(30, 30, 30, 0.2) 50%, rgba(30, 30, 30, 0.4) 50%, rgba(30, 30, 30, 0.4));
  background-size: 100% 2px;
}
.screen::after {
  opacity: 0;
  background: rgba(18, 16, 16, 0.1);
  -webkit-animation: flicker 0.2s infinite;
          animation: flicker 0.2s infinite;
}
