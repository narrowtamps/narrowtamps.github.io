
<!DOCTYPE html>
<html>
<head>
    <title>Admin - Update Site</title>
</head>
<body>
    <h2>Admin Control Panel</h2>
    
    <input type="password" id="admin_pass" placeholder="Enter Admin Password"><br><br>
    
    <input type="text" id="session_name" placeholder="Session Name (e.g. Session 1)"><br><br>
    
    <textarea id="message" placeholder="Type message here..." rows="5"></textarea><br><br>
    
    <button id="send_btn">Push Update to All Users</button>

    <!-- FIREBASE SDKS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getDatabase, ref, set, push } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";

        // REPLACE THIS with your actual Firebase config from the console
        const firebaseConfig = {
    apiKey: "AIzaSyC5Xbq3md9TsNkAviKPv1Rw5W0zu0sd1ns",
    authDomain: "starfight-37ba5.firebaseapp.com",
    databaseURL: "https://starfight-37ba5-default-rtdb.firebaseio.com",
    projectId: "starfight-37ba5",
    storageBucket: "starfight-37ba5.firebasestorage.app",
    messagingSenderId: "317349343613",
    appId: "1:317349343613:web:bf8556967437162db49c14",
    measurementId: "G-NSGC4YKT65"
  };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Simple local password check (Change "1234" to your choice)
        const MASTER_PASSWORD = "1234";

        document.getElementById('send_btn').addEventListener('click', async () => {
            const pass = document.getElementById('admin_pass').value;
            const name = document.getElementById('session_name').value;
            const msg = document.getElementById('message').value;

            if (pass !== MASTER_PASSWORD) {
                alert("Incorrect Password!");
                return;
            }

            try {
                // Update the "Live" view
                await set(ref(db, 'current'), { name: name, message: msg });

                // Add to the "History" list
                await push(ref(db, 'history'), { name: name, message: msg });

                alert("Success! Everyone's screen just updated.");
            } catch (error) {
                console.error(error);
                alert("Error updating: " + error.message);
            }
        });
    </script>
</body>
</html>
