<!DOCTYPE html>
<html>
<head>
    <title>Admin - Update Site</title>
</head>
<body>
    <h2>Admin Control Panel</h2>
    
    <input type="password" id="admin_pass" placeholder="Enter Admin Password"><br><br>
    
    <input type="text" id="session_name" placeholder="Session Name (e.g. Session 1)"><br><br>
    
    <textarea id="message" placeholder="Type message here..." rows="5"></textarea><br><br>
    <!-- Ensure your button looks exactly like this -->
<button id="send_btn">Push Update</button>




        <script type="module" crossorigin="anonymous">
  import { initializeApp } from "https://www.gstatic.com";
  import { getDatabase, ref, set, push } from "https://www.gstatic.com";

  const firebaseConfig = { 
    /* PASTE YOUR KEYS HERE */ 
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // Directly attach the click event to the button by its ID
  const btn = document.getElementById('send_btn');
  
  btn.addEventListener('click', async () => {
    console.log("Button recognized the click!"); // This proves the connection works
    
    const name = document.getElementById('session_name').value;
    const msg = document.getElementById('message').value;

    try {
      await set(ref(db, 'current'), { name, message: msg });
      await push(ref(db, 'history'), { name, message: msg });
      alert("Sent Successfully!");
    } catch (e) {
      console.error("Firebase Error:", e);
      alert("Error: " + e.message);
    }
  });
</script>


</body>
</html>
