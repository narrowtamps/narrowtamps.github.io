
<!DOCTYPE html>
<html lang="en">

  <head>
    
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>The Tamps play Astroid Duet</title>
    <link rel="stylesheet" href="https://public.codepenassets.com/css/normalize-5.0.0.min.css">
<link rel="stylesheet" href="lofi/dist/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
<style>
  .grid-container {
  display: grid;
  /* MOBILE DEFAULT: 1 column stack */
  grid-template-columns: 1fr; 
  gap: 20px; 
  width: 90%;
  margin: 0 auto; /* Center the container */
}

.orbitron-<uniquifier> {
  font-family: "Orbitron", sans-serif;
  font-optical-sizing: auto;
  font-weight: <weight>;
  font-style: normal;
}
@media (min-width: 768px) {
  .grid-container {
    /* DESKTOP: 2 columns side-by-side */
    grid-template-columns: 2fr 1fr; 
    gap: 40px;
    width: 80%;
  }
  .logo {
    width:150px;
  }
}

.lofi-text {
  font-size: 1.2em;
  font-family: Orbitron, sans-serif;
  color: white;
  line-height: 1.6;
}
  .lofi h1 {
 
  white-space: nowrap; 
  font-size: clamp(1.5em, 8vw, 4em); 
  
  margin: 0;
  font-weight:36;
}

/* Ensure the individual letters don't force blocks */
.letter {
  display: inline-block;
}
.neonText {
  font-family: "Tilt Neon", sans-serif;
  text-align: center;
  /* Make sure this bracket exists! */
} 

/* Target the links specifically to force the glow */
.neonText a, .neonText p {
  color: lime !important;
  
     text-shadow:
      0 0 4px #fff,
      0 0 20px #0fa,
      0 0 40px #0fa,
      0 0 60px #0fa;
  will-change: text-shadow;
}
  .site-header {
    position: fixed; /* Keeps it at the top even when scrolling */
    top: 0;
    left: 0;
    width: 100%;
    z-index: 1000;   /* Higher than background-div */
    padding:20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: transparent; /* Or rgba(0,0,0,0.5) for a dark tint */
}

.logo {
    max-width: 80px;
    height: auto;
    position: relative;
    z-index: 1001; /* Ensure logo itself is on top */
}

  .home-link {
    display: block; 
}

  .neon-glow-image {
  /* The drop-shadow follows the shape of the image content itself */
  filter: drop-shadow(0 0 10px #ff00ff) drop-shadow(0 0 20px #ff00ff) drop-shadow(0 0 30px rgba(255, 0, 255, 0.5));
  /* Optional: Add a smooth transition for hover effects */
  transition: filter 0.3s ease-in-out;
}

.neon-glow-image:hover {
  filter: drop-shadow(0 0 15px #ff00ff) drop-shadow(0 0 30px #ff00ff) drop-shadow(0 0 45px rgba(255, 0, 255, 0.7));
}
a:link {
  color: silver; /* Unvisited link color */
}

a:visited {
  color: gray; /* Visited link color */
}

a:hover {
  color: lime; /* Color on mouseover */
}

a:active {
  color: violet; /* Color when clicked */
}
.letter {
  -webkit-text-stroke: 7px #AEFD6C;
  margin-top: -8px;
  display: inline-block;
  padding: 0 1px;
  -webkit-animation: glow 2.5s linear infinite;
  animation: glow 2.5s linear infinite;
}

</style>
  </head>
    
  <body>
     <header class="site-header">
        <div class="logo-container">
            <!-- Wrap the logo in an anchor tag linking to the home page (/) -->
            <a href="/" class="home-link" aria-label="Go to homepage">
                <img src="neon2.png" alt="Company Logo" class="logo neon-glow-image">
            </a>
        </div>
        
    </header>
    <main>
  <div class="home"> <!-- Remove display:flex from here -->
    <div>
  <div class="grid-container">
    <!-- Row 1, Col 1: Your Title -->
    <div class="lofi">
      <h1>
    <div class="letter">A</div>
    <div class="letter">s</div>
    <div class="letter">t</div>
    <div class="letter">r</div>
    <div class="letter">o</div>
    <div class="letter">i</div>
    <div class="letter">d</div><br>
    <div class="letter">D</div>
    <div class="letter">u</div>
    <div class="letter">e</div>
    <div class="letter">t</div>
    <div class="letter">!</div>
 </h1>
    </div>

    

    <!-- Row 2, Col 1: Your Description (This was overlapping) -->
    <div class="lofi-text" style="color:white">
      <br>
      A mini-campaign by Dungeon Mistress Echoeypie! We're playtesting <a href="https://avantris.com/">Legends of Avantris</a>'s new Kickstarter, <a href="https://www.launchoracle.com/avantris-entertainment/neon-odyssey/BLAST?ref=ix5n1">Neon Odyssey</a>, as bounty hunters seeking out the notorious criminal Glup Bondo.
    <br>
  </div>
    
   
  </div>
    </div>
    
    </div>
      <!-- Change the style attribute to include width: 100% -->
<footer style="position: absolute; bottom:0; width: 100%; z-index: 9999;">
    <div class="neonText"> 
        <div id="footer-placeholder"></div>
        <script src="/pages/script.js"></script>
    </div>
</footer>

    </main>
    
  </body>
  
</html>
