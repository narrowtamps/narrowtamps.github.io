<style>
  .grid-container {
  display: grid;
  /* MOBILE DEFAULT: 1 column stack */
  grid-template-columns: 1fr; 
  gap: 20px; 
  width: 90%;
  margin: 0 auto; /* Center the container */
}

.orbitron-<uniquifier> {
  font-family: "Orbitron", sans-serif;
  font-optical-sizing: auto;
  font-weight: <weight>;
  font-style: normal;
}
@media (min-width: 768px) {
  .grid-container {
    /* DESKTOP: 2 columns side-by-side */
    grid-template-columns: 2fr 1fr; 
    gap: 40px;
    width: 80%;
  }
}

.lofi-text {
  font-size: 1.2em;
  font-family: Orbitron, sans-serif;
  color: white;
  line-height: 1.6;
}
  .lofi h1 {
  /* 1. Prevent wrapping to a new line */
  white-space: nowrap; 
  
  /* 2. Fluid font size: 
     Min: 1.5rem (small mobile)
     Ideal: 8vw (8% of screen width)
     Max: 4rem (large desktop) */
  font-size: clamp(1.5em, 4em, 8em); 
  
  /* Optional: align it if needed */
  margin: 0;
}

/* Ensure the individual letters don't force blocks */
.letter {
  display: inline-block;
}



</style>
