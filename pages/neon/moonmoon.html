
<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Moon Moon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="synth/dist/style.css">
<style>
  .body{
    font-size:25;
  }
  .container {
  position: relative;
  width: 100vx;
 
 
  display: flex;     /* Helps the background-div match the content height */
}

.background-div {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  /* Add this to ensure images cover the area without gaps */
  background-size: cover; 
  background-position: center;
}

.overlay-div {
  position: relative; /* Change from absolute so it pushes the container's height */
  width: 100%;
  padding: 10px 10px; /* Add spacing here instead of fixed height */
  


  box-sizing: border-box; /* Ensures padding doesn't increase the total width */
    vertical-align: middle;
   
    
    z-index: 2; /* Ensures this div appears in front of the background div */
    /* Add styling for content alignment (e.g., flexbox for centering) */
    display:flex;
   flex-direction: column;
    justify-content: center;
    align-items: center;
  
}
  .text-box {
    width: 100%; /* Initially take full width of container */
    max-width: 33.33%; /* Limit width to one-third of the screen width */
    
    text-align: center; /* Center the text inside the box */
    font-family:Outfit;
    font-weight:900;
    font-size:30px;
}

.outfit-<uniquifier> {
  font-family: "Outfit", sans-serif;
  font-optical-sizing: auto;
  font-weight: <weight>;
  font-style: normal;
}
  @media (min-width: 768px) {
  .overlay-div {
height:100vh;
  display: flex;
    max-height:50%;
  align-items: center; /* Vertically centers the content */
  justify-content: center; /* Horizontally centers the content */
  width: 100%;
  padding: 20px 20px; /* Add spacing here instead of fixed height */
  }

}
</style>
  </head>
    
  <body>
  <div class="container">
    <div class="overlay-div">
      <div class="text-box">
      <p>Dungeon Mistress Harley - From the horrors of Druskenvald to the horrors of space, will the Blood Moon crew survive their toughest challenge yet: a childrens' casino & resturaunt?
</p>
      </div>
    </div>

    <div class="background-div">
      <script  src="synth/dist/script.js"></script>
    </div>
  </div>
    

  </body>
  
</html>
