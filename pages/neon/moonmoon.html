
<!DOCTYPE html>
<html lang="en">

  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Moon Moon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="synth/dist/style.css">
<style>
  /* Fix basic page setup */
body, html {
  margin: 0;
  padding: 0;
  height: 100%;
 overflow: hidden;
}
  .stroked-text {
    <!-- -webkit-text-stroke-width: .5px; /* Outline width */
    -webkit-text-stroke-color: white; /* Outline color */
    -->
}


.container {
  position: relative;
  width: 100vw; 
  height: 40vh; /* MOBILE CROP: Only shows middle slice of background */
  display: flex;
}

.background-div {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}

/* Force your synth script/canvas to fill the cropped area */
.background-div canvas {
  width: 100% !important;
  height: 100% !important;
  object-fit: cover;
}

.overlay-div {
  position: relative;
  width: 100%;
  height: 100%; /* Important for centering math */
  z-index: 2;
  display: flex;
  flex-direction: column;
  justify-content: flex-start; 
    padding-top: 15vh; 
  align-items: center;
}

.text-box {
  width: 90%; 
  max-width: 90%; 
  text-align: center;
  color:#c41489;
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 22px;
  text-shadow: 0 0 20px rgba(196, 20, 137,0.8);
  padding:20px;
  /* THE SHIFT: Move text up by 33% of the container height */
  transform: translateY(-40%); 
  background-color: rgba(153, 214, 0,0);
  padding-top:10vh;
}


@media (min-width: 768px) {
  .container {
    height: 100vh; /* Full height on desktop */
    
  
}
  .text-box {
    max-width: 33.33%; /* Back to your 1/3 width */
    font-size: 26px;
    /* Keeps the 33% upward shift on desktop too */
    transform: translateY(-33%); 
    justify-content: flex-start; 
     padding-top: 10vh; 
  }
}
  
.glow-text {
  color: white; /* Color of the main text */
  text-shadow:
    0 0 4px #ff0000, /* horizontal-offset | vertical-offset | blur-radius | color */
    0 0 10px #ff0000,
    0 0 15px #ff0000;
}

.outline-text {
  color: white;
  /* By using 0 blur and 0 offset, you create a solid background/outline */
  text-shadow:
    1px 1px 0 #000,
    -1px -1px 0 #000,
    1px -1px 0 #000,
    -1px 1px 0 #000;
}

.neonText {
  animation: pulsate  infinite alternate;
  color: #fff;
   will-change: text-shadow;
}


@keyframes pulsate {
  100% {
    /* Larger blur radius */
    text-shadow:
      0 0 4px #fff,
      0 0 11px #fff,
      0 0 19px #fff,
      0 0 20px #0fa,
      0 0 30px #0fa,
      0 0 40px #0fa,
      0 0 50px #0fa,
      0 0 60px #0fa;
  }
  0% {
    /* Smaller blur radius */
    text-shadow:
      0 0 2px #fff,
      0 0 4px #fff,
      0 0 6px #fff,
      0 0 10px #0fa,
      0 0 45px #0fa,
      0 0 55px #0fa,
      0 0 70px #0fa,
      0 0 80px #0fa;
  }
}

</style>
  </head>
    
  <body>
  <div class="container">
    <div class="overlay-div">
      <div class="text-box" style="color:#c41489;">
        <h1 class="stroked-text">Moon Moon</h1>
      <p class="stroked-text">Dungeon Mistress Harley</p>
        <p class="stroked-text">From the horrors of Druskenvald to the horrors of space, will the Blood Moon crew survive their toughest challenge yet: a childrens' casino & restaurant?
</p>
        </p>
      </div>
    </div>

    <div class="background-div">
      <script  src="synth/dist/script.js"></script>
      
    </div>
    
  </div>
    <div class="neonText"> 
    <div id="footer-placeholder" style="position:absolute; bottom:8px;"></div>
    <script src="../script.js"></script>
    </div>
  </body>
  
</html>
