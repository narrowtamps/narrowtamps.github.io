<style>
  /* Fix basic page setup */
body, html {

 overflow: hidden;

.tilt-neon {
  font-family: "Tilt Neon", sans-serif;
  font-optical-sizing: auto;
  font-weight: 400;
  font-style: normal;
  font-variation-settings:
    "XROT" 0,
    "YROT" 0;
}
.container {
  position: relative;
  
  height: 40vh; /* MOBILE CROP: Only shows middle slice of background */
  display: flex;
}

.background-div {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}

/* Force your synth script/canvas to fill the cropped area */
.background-div canvas {
  width: 100% !important;
  height: 100% !important;
  object-fit: cover;
  top:0;
  left:0;
}

.overlay-div {
    position: absolute; /* Changed from relative to overlay correctly */
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 2; /* Must be higher than background-div's z-index */
    display: flex;
    flex-direction: column;
    justify-content: center; /* Centers text vertically */
    align-items: center;    /* Centers text horizontally */
    pointer-events: none;   /* Allows clicks to pass through to the background if needed */
}

.text-box {
    pointer-events: auto;   /* Makes text selectable/clickable again */
    /* Remove the negative transform if you want it perfectly centered 
    transform: none; 
   

  width: 90%; 
  max-width: 90%; */
  text-align: center;
  color:#c41489;
  font-family: 'Outfit', sans-serif;
  font-weight: 900;
  font-size: 22px;
  text-shadow: 0 0 20px rgba(196, 20, 137,0.8);
  padding:20px;
  /* THE SHIFT: Move text up by 33% of the container height */
  
  background-color: rgba(153, 214, 0,0);
  padding-top:10vh;
  padding-top: 100px; 
     margin-top: 50px; 
}



.glow-text {
  color: white; /* Color of the main text */
  text-shadow:
    0 0 4px #ff0000, /* horizontal-offset | vertical-offset | blur-radius | color */
    0 0 10px #ff0000,
    0 0 15px #ff0000;
}

.outline-text {
  color: white;
  /* By using 0 blur and 0 offset, you create a solid background/outline */
  text-shadow:
    1px 1px 0 #000,
    -1px -1px 0 #000,
    1px -1px 0 #000,
    -1px 1px 0 #000;
}

.neonText {
  font-family: "Tilt Neon", sans-serif;
  text-align: center;
  /* Make sure this bracket exists! */
} 

/* Target the links specifically to force the glow */
.neonText a, .neonText p {
  color: lime !important;
  
     text-shadow:
      0 0 4px #fff,
      0 0 20px #0fa,
      0 0 40px #0fa,
      0 0 60px #0fa;
  will-change: text-shadow;
}

@keyframes pulsate {
  0% {
    text-shadow:
      0 0 4px #fff,
      0 0 10px #0fa,
      0 0 20px #0fa;
  }
  100% {
    text-shadow:
      0 0 4px #fff,
      0 0 20px #0fa,
      0 0 40px #0fa,
      0 0 60px #0fa;
  }
}

  
.site-header {
   box-sizing: border-box;
    width: 100%;
    display: flex;
    justify-content: space-between;

    left: 0;

  .neon-glow-image {
  /* The drop-shadow follows the shape of the image content itself */
  filter: drop-shadow(0 0 10px #ff00ff) drop-shadow(0 0 20px #ff00ff) drop-shadow(0 0 30px rgba(255, 0, 255, 0.5));
  /* Optional: Add a smooth transition for hover effects */
  transition: filter 0.3s ease-in-out;
}

.neon-glow-image:hover {

}
